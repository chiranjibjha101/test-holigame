server {
    listen 80;
    
    # Optional: Change to your domain, but '_' or 'localhost' works behind an ALB
    server_name _;

    # 1. Host the Frontend directly for best performance
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy WebSockets to Node.js backend
    location /socket.io/ {
        proxy_pass http://backend:3000; 
        
        # Required for WebSockets to upgrade correctly
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # ALB passes these headers automatically so your backend knows the real IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}