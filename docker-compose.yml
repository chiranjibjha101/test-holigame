services:
  backend:
    build: .
    container_name: holi-backend
    restart: unless-stopped
    # Port 3000 is isolated in the Docker network.
    # NGINX accesses it internally via `http://backend:3000`
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: holi-nginx
    restart: unless-stopped
    ports:
      - "80:80" # Open port 80 so the AWS ALB can route traffic here
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - backend
