<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
    />
    <title>Holi Splash</title>
    <script src="/socket.io/socket.io.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --p1: #3d9fff;
        --p2: #ff3d5a;
        --bg: #fff8f0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family: "Nunito", sans-serif;
        text-align: center;
        overflow: hidden;
        touch-action: none;
      }
      #confetti-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .confetti-dot {
        position: absolute;
        border-radius: 50%;
        opacity: 0.18;
        animation: floatDot linear infinite;
      }
      @keyframes floatDot {
        0% {
          transform: translateY(110vh) rotate(0deg);
          opacity: 0.18;
        }
        100% {
          transform: translateY(-10vh) rotate(360deg);
          opacity: 0;
        }
      }
      @keyframes hueShift {
        0% {
          filter: hue-rotate(0deg);
        }
        100% {
          filter: hue-rotate(360deg);
        }
      }
      @keyframes shimmer {
        0% {
          left: -100%;
        }
        100% {
          left: 200%;
        }
      }

      /* ── Selection ── */
      #sel {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #fff8f0, #ffe8f0, #e8f8ff);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        gap: 5px;
      }
      #sel h1 {
        font-family: "Lilita One", cursive;
        font-size: clamp(2rem, 6vw, 3.2rem);
        margin: 0 0 2px;
        background: linear-gradient(
          90deg,
          #ff3d5a,
          #ff8c00,
          #ffe033,
          #3dff8c,
          #3d9fff,
          #cc3dff
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: hueShift 3s linear infinite;
      }
      #sel p {
        color: #999;
        font-size: 0.88rem;
        margin: 0 0 18px;
        font-weight: 600;
      }
      .cards {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .card {
        background: #fff;
        border-radius: 22px;
        padding: 22px 22px;
        width: 215px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.09);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        border: 3px solid transparent;
        transition: border-color 0.2s, transform 0.2s, opacity 0.2s;
      }
      .card:not(.taken):hover {
        transform: translateY(-3px);
      }
      .card.p1 {
        border-color: var(--p1);
      }
      .card.p2 {
        border-color: var(--p2);
      }
      .card.taken {
        opacity: 0.48;
        pointer-events: none;
      }
      .avatar {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        font-size: 1.7rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card.p1 .avatar {
        background: #3d9fff22;
      }
      .card.p2 .avatar {
        background: #ff3d5a22;
      }
      .clabel {
        font-family: "Lilita One", cursive;
        font-size: 1.05rem;
      }
      .card.p1 .clabel {
        color: var(--p1);
      }
      .card.p2 .clabel {
        color: var(--p2);
      }
      .nig {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }
      .ni {
        width: 100%;
        padding: 9px 12px;
        border: 2px solid #eee;
        border-radius: 12px;
        font-family: "Nunito", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        color: #333;
        outline: none;
        text-align: center;
        transition: border-color 0.2s;
      }
      .ni:focus {
        border-color: #ff8c00;
      }
      .ni::placeholder {
        color: #ccc;
        font-weight: 600;
      }
      .jbtn {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 14px;
        font-family: "Lilita One", cursive;
        font-size: 1rem;
        color: #fff;
        cursor: pointer;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.12);
        transition: transform 0.1s, box-shadow 0.1s;
        position: relative;
        overflow: hidden;
      }
      .jbtn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        animation: shimmer 2.5s infinite;
      }
      .jbtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 0 rgba(0, 0, 0, 0.12);
      }
      .jbtn:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.12);
      }
      .card.p1 .jbtn {
        background: linear-gradient(135deg, #3d9fff, #2266cc);
      }
      .card.p2 .jbtn {
        background: linear-gradient(135deg, #ff3d5a, #cc1130);
      }
      .taken-lbl {
        font-size: 0.75rem;
        color: #aaa;
        font-weight: 700;
        background: #f4f4f4;
        border-radius: 20px;
        padding: 3px 12px;
      }
      .specbtn {
        background: linear-gradient(135deg, #7f8c8d, #4a5568);
        color: #fff;
        border: none;
        padding: 11px 26px;
        border-radius: 20px;
        font-family: "Lilita One", cursive;
        font-size: 0.95rem;
        cursor: pointer;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.12);
        transition: transform 0.1s;
        margin-top: 4px;
      }
      .specbtn:hover {
        transform: translateY(-2px);
      }
      .specbtn:active {
        transform: translateY(2px);
      }
      .whint {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 14px;
      }
      .wtag {
        background: #fff;
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 0.76rem;
        color: #666;
        font-weight: 700;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
      }

      /* ── Game ── */
      #gw {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        width: 100vw;
        height: 100vh;
        padding-top: 8px;
      }
      #topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 820px;
        margin-bottom: 6px;
        padding: 0 10px;
      }
      .title {
        font-family: "Lilita One", cursive;
        font-size: 1.4rem;
        background: linear-gradient(90deg, #ff3d5a, #ff8c00, #3d9fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: hueShift 4s linear infinite;
      }
      .sb {
        background: #fff;
        border-radius: 30px;
        padding: 6px 16px;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
        font-weight: 800;
        font-size: 0.92rem;
        color: #333;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .sb .s1 {
        color: var(--p1);
      }
      .sb .s2 {
        color: var(--p2);
      }
      #rbtn {
        background: linear-gradient(135deg, #ff8c00, #ff3d5a);
        color: #fff;
        border: none;
        padding: 7px 14px;
        border-radius: 20px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        cursor: pointer;
        font-size: 0.82rem;
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.15);
        transition: transform 0.1s;
      }
      #rbtn:active {
        transform: scale(0.95);
      }
      #wbar {
        display: flex;
        gap: 8px;
        margin-bottom: 6px;
        max-width: 820px;
        width: 100%;
        padding: 0 10px;
        justify-content: center;
        align-items: center;
      }
      .wb {
        background: #fff;
        border: 3px solid #eee;
        border-radius: 14px;
        padding: 6px 14px;
        cursor: pointer;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.82rem;
        color: #555;
        transition: all 0.15s;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .wb:hover {
        transform: translateY(-2px);
      }
      .wb.active {
        border-color: #ff8c00;
        color: #ff8c00;
        background: #fff8f0;
      }
      .wb .bdg {
        background: #ff8c00;
        color: #fff;
        font-size: 0.68rem;
        padding: 1px 5px;
        border-radius: 8px;
      }
      #status {
        font-weight: 800;
        font-size: 0.88rem;
        padding: 4px 14px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      canvas {
        background: #fff;
        border: 3px solid #f0e0d0;
        border-radius: 14px;
        width: 100%;
        max-width: 820px;
        aspect-ratio: 8/5;
        box-shadow: 0 6px 25px rgba(0, 0, 0, 0.1);
      }
      #mc {
        display: none;
        width: 100%;
        max-width: 820px;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        margin-top: 6px;
      }
      .dp {
        display: grid;
        grid-template-columns: 48px 48px 48px;
        grid-template-rows: 48px 48px 48px;
        gap: 4px;
      }
      .btn {
        background: #2c3e50;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        font-size: 1.1rem;
        user-select: none;
        cursor: pointer;
      }
      .btn:active {
        background: #1a252f;
        transform: scale(0.93);
      }
      .bup {
        grid-column: 2;
        grid-row: 1;
      }
      .bleft {
        grid-column: 1;
        grid-row: 2;
      }
      .bright {
        grid-column: 3;
        grid-row: 2;
      }
      .bdown {
        grid-column: 2;
        grid-row: 3;
      }
      #splashbtn {
        width: 78px;
        height: 78px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          #ff3d5a,
          #ff8c00,
          #ffe033,
          #3dff8c,
          #3d9fff,
          #cc3dff
        );
        color: #fff;
        font-family: "Lilita One", cursive;
        font-size: 1rem;
        border: none;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
        cursor: pointer;
        animation: hueShift 2s linear infinite;
      }
      #splashbtn:active {
        transform: scale(0.88);
      }
      #mw {
        display: none;
        gap: 6px;
        justify-content: center;
        padding: 0 10px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .mwb {
        background: #fff;
        border: 2px solid #eee;
        border-radius: 10px;
        padding: 5px 10px;
        font-weight: 800;
        font-size: 0.78rem;
        color: #555;
        cursor: pointer;
      }
      .mwb.active {
        border-color: #ff8c00;
        color: #ff8c00;
      }
      #hf {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 50;
        opacity: 0;
        transition: opacity 0.05s;
      }
      #toast {
        position: fixed;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%) translateY(30px);
        background: #222;
        color: #fff;
        border-radius: 20px;
        padding: 10px 22px;
        font-family: "Lilita One", cursive;
        font-size: 1.1rem;
        opacity: 0;
        transition: all 0.3s;
        z-index: 200;
        pointer-events: none;
        white-space: nowrap;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      @media (max-width: 850px) {
        #mc {
          display: flex;
        }
        #mw {
          display: flex;
        }
        .title {
          font-size: 1rem;
        }
        #wbar {
          display: none;
        }
        .card {
          width: 165px;
          padding: 16px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div id="confetti-bg"></div>
    <div id="hf"></div>
    <div id="toast"></div>

    <!-- SELECTION -->
    <div id="sel">
      <h1>🎨 Holi Splash! 🎨</h1>
      <p>Pick your slot, enter your name &amp; splash away!</p>
      <div class="cards">
        <div class="card p1" id="card-p1">
          <div class="avatar">🎮</div>
          <div class="clabel">Player 1</div>
          <div class="nig" id="p1form">
            <input
              class="ni"
              id="n1"
              maxlength="14"
              placeholder="Your name…"
              autocomplete="off"
              spellcheck="false"
            />
            <button class="jbtn" onclick="join('P1')">
              Play as Player 1 💙
            </button>
          </div>
          <div class="taken-lbl" id="p1tk" style="display: none">
            ⛔ Already taken
          </div>
        </div>
        <div class="card p2" id="card-p2">
          <div class="avatar">🎮</div>
          <div class="clabel">Player 2</div>
          <div class="nig" id="p2form">
            <input
              class="ni"
              id="n2"
              maxlength="14"
              placeholder="Your name…"
              autocomplete="off"
              spellcheck="false"
            />
            <button class="jbtn" onclick="join('P2')">
              Play as Player 2 ❤️
            </button>
          </div>
          <div class="taken-lbl" id="p2tk" style="display: none">
            ⛔ Already taken
          </div>
        </div>
      </div>
      <button class="specbtn" onclick="join('Spectator')">👁️ Spectate</button>
      <div class="whint">
        <div class="wtag">🎈 Balloon [1]</div>
        <div class="wtag">💦 Pichkari [2]</div>
        <div class="wtag">💣 Bomb [3]</div>
        <div class="wtag">⚡ Burst [4]</div>
      </div>
    </div>

    <!-- GAME -->
    <div id="gw">
      <div id="topbar">
        <div class="title">🎨 Holi Splash!</div>
        <div class="sb">
          <span class="s1"
            >🎮 <span id="ln1">P1</span>: <span id="sc1">0</span></span
          >
          <span style="color: #ddd">|</span>
          <span class="s2"
            >🎮 <span id="ln2">P2</span>: <span id="sc2">0</span></span
          >
        </div>
        <button id="rbtn" onclick="resetGame()">🔄 Reset</button>
      </div>
      <div id="wbar">
        <span id="status">Connecting…</span>
        <div style="display: flex; gap: 8px">
          <button class="wb active" onclick="selW('balloon')" id="wb-balloon">
            🎈 Balloon <span class="bdg">∞</span>
          </button>
          <button class="wb" onclick="selW('pichkari')" id="wb-pichkari">
            💦 Pichkari <span class="bdg">∞</span>
          </button>
          <button class="wb" onclick="selW('bomb')" id="wb-bomb">
            💣 Bomb <span class="bdg" id="bc">3</span>
          </button>
          <button class="wb" onclick="selW('burst')" id="wb-burst">
            ⚡ Burst <span class="bdg" id="brc">2</span>
          </button>
        </div>
      </div>
      <canvas id="c" width="800" height="500"></canvas>
      <div id="mw">
        <button class="mwb active" onclick="selW('balloon')" id="mwb-balloon">
          🎈
        </button>
        <button class="mwb" onclick="selW('pichkari')" id="mwb-pichkari">
          💦
        </button>
        <button class="mwb" onclick="selW('bomb')" id="mwb-bomb">
          💣<small id="mbc">3</small>
        </button>
        <button class="mwb" onclick="selW('burst')" id="mwb-burst">
          ⚡<small id="mbrc">2</small>
        </button>
      </div>
      <div id="mc">
        <div class="dp">
          <button class="btn bup" id="bu">▲</button>
          <button class="btn bleft" id="bl">◀</button>
          <button class="btn bright" id="br">▶</button>
          <button class="btn bdown" id="bd">▼</button>
        </div>
        <button id="splashbtn">SPLASH!</button>
      </div>
    </div>

    <script>
      // ── Audio ──────────────────────────────────────────
      const ACtx = window.AudioContext || window.webkitAudioContext;
      let ac = null;
      function ea() {
        if (!ac) ac = new ACtx();
        if (ac.state === "suspended") ac.resume();
      }
      function tone(f, t, d, v = 0.3) {
        ea();
        const o = ac.createOscillator(),
          g = ac.createGain();
        o.connect(g);
        g.connect(ac.destination);
        o.type = t;
        o.frequency.value = f;
        g.gain.setValueAtTime(v, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + d);
        o.start();
        o.stop(ac.currentTime + d);
      }
      function noise(d, v = 0.15) {
        ea();
        const n = ac.sampleRate * d,
          buf = ac.createBuffer(1, n, ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
        const src = ac.createBufferSource();
        src.buffer = buf;
        const g = ac.createGain(),
          fl = ac.createBiquadFilter();
        fl.type = "bandpass";
        fl.frequency.value = 800;
        src.connect(fl);
        fl.connect(g);
        g.connect(ac.destination);
        g.gain.setValueAtTime(v, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + d);
        src.start();
        src.stop(ac.currentTime + d);
      }
      const sfx = {
        balloon: () => {
          tone(400, "sine", 0.1, 0.2);
          tone(600, "sine", 0.08, 0.1);
        },
        pichkari: () => {
          noise(0.15, 0.12);
          tone(300, "sawtooth", 0.12, 0.08);
        },
        bomb: () => {
          tone(200, "square", 0.15, 0.25);
          setTimeout(() => noise(0.1, 0.2), 50);
        },
        burst: () => {
          [600, 800, 1000, 800, 600].forEach((f, i) =>
            setTimeout(() => tone(f, "sine", 0.05, 0.15), i * 30)
          );
        },
        hit: () => {
          noise(0.25, 0.3);
          tone(150, "sine", 0.3, 0.2);
          [880, 660, 440].forEach((f, i) =>
            setTimeout(() => tone(f, "triangle", 0.12, 0.15), i * 40)
          );
        },
        score: () => {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => tone(f, "sine", 0.15, 0.25), i * 80)
          );
        },
        powerup: () => {
          [440, 550, 660, 880].forEach((f, i) =>
            setTimeout(() => tone(f, "sine", 0.1, 0.2), i * 60)
          );
        },
        empty: () => tone(200, "square", 0.08, 0.15),
        walk: () => {
          if (Math.random() < 0.08) tone(180, "sine", 0.03, 0.04);
        },
      };

      // ── Confetti ───────────────────────────────────────
      (() => {
        const el = document.getElementById("confetti-bg");
        const cols = [
          "#ff3d5a",
          "#3d9fff",
          "#ffe033",
          "#3dff8c",
          "#ff3db4",
          "#ff8c00",
          "#cc3dff",
        ];
        for (let i = 0; i < 30; i++) {
          const d = document.createElement("div");
          d.className = "confetti-dot";
          const s = 8 + Math.random() * 16;
          Object.assign(d.style, {
            left: Math.random() * 100 + "vw",
            width: s + "px",
            height: s + "px",
            background: cols[~~(Math.random() * cols.length)],
            animationDuration: 6 + Math.random() * 10 + "s",
            animationDelay: Math.random() * 12 + "s",
          });
          el.appendChild(d);
        }
      })();

      // ── State ──────────────────────────────────────────
      const socket = io();
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const HOLI = [
        "#FF1744",
        "#00E676",
        "#2979FF",
        "#FFEA00",
        "#FF4081",
        "#00B0FF",
        "#FF6D00",
        "#D500F9",
        "#76FF03",
      ];

      let myRole = null,
        myName = "",
        players = {},
        balloons = [],
        splatters = [];
      let gameActive = false,
        cooldown = 0,
        weapon = "balloon";
      let ammo = { balloon: Infinity, pichkari: Infinity, bomb: 3, burst: 2 };
      let me = { x: 400, y: 250, dx: 1, dy: 0, radius: 20 };
      let particles = [],
        fieldPUs = [],
        nextPU = 300;
      let shake = { x: 0, y: 0, t: 0, i: 0 };
      let speedBoost = 1,
        speedT = 0;
      let names = { P1: "Player 1", P2: "Player 2" };

      // ── Helpers ────────────────────────────────────────
      let _tt = null;
      function toast(msg, ms = 1800) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(_tt);
        _tt = setTimeout(() => el.classList.remove("show"), ms);
      }
      function flash(color) {
        const f = document.getElementById("hf");
        f.style.background = color;
        f.style.opacity = ".35";
        setTimeout(() => (f.style.opacity = "0"), 200);
      }
      function doShake(i = 8) {
        shake.t = 10;
        shake.i = i;
      }
      function parts(x, y, color, n = 12, big = false) {
        for (let i = 0; i < n; i++) {
          const a = (Math.PI * 2 * i) / n + Math.random() * 0.3;
          const s = big ? 4 + Math.random() * 8 : 2 + Math.random() * 4;
          particles.push({
            x,
            y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            r: big ? 3 + Math.random() * 5 : 2 + Math.random() * 3,
            color,
            a: 1,
            life: big ? 1 : 0.8,
            decay: 0.02 + Math.random() * 0.02,
            g: 0.15,
          });
        }
      }
      function streamParts(x, y, vx, vy, color) {
        for (let i = 0; i < 5; i++)
          particles.push({
            x,
            y,
            vx: vx * (0.8 + Math.random() * 0.4) + (Math.random() - 0.5) * 2,
            vy: vy * (0.8 + Math.random() * 0.4) + (Math.random() - 0.5) * 2,
            r: 2 + Math.random() * 2,
            color,
            a: 0.85,
            life: 0.6,
            decay: 0.045,
            g: 0.04,
          });
      }
      function updAmmo() {
        document.getElementById("bc").textContent =
          ammo.bomb > 0 ? ammo.bomb : "✗";
        document.getElementById("brc").textContent =
          ammo.burst > 0 ? ammo.burst : "✗";
        document.getElementById("mbc").textContent =
          ammo.bomb > 0 ? ammo.bomb : "✗";
        document.getElementById("mbrc").textContent =
          ammo.burst > 0 ? ammo.burst : "✗";
      }
      function updNames() {
        document.getElementById("ln1").textContent = names.P1;
        document.getElementById("ln2").textContent = names.P2;
      }
      function updScores(sc) {
        document.getElementById("sc1").textContent = sc.P1;
        document.getElementById("sc2").textContent = sc.P2;
      }

      // ── Weapon select ──────────────────────────────────
      function selW(w) {
        ea();
        if (w === "bomb" && ammo.bomb <= 0) {
          sfx.empty();
          toast("💣 No bombs! Find a power-up!");
          return;
        }
        if (w === "burst" && ammo.burst <= 0) {
          sfx.empty();
          toast("⚡ No burst! Find a power-up!");
          return;
        }
        weapon = w;
        ["balloon", "pichkari", "bomb", "burst"].forEach((id) => {
          document
            .getElementById("wb-" + id)
            ?.classList.toggle("active", id === w);
          document
            .getElementById("mwb-" + id)
            ?.classList.toggle("active", id === w);
        });
      }

      // ── Socket ─────────────────────────────────────────
      socket.on("rolesUpdate", (roles) => {
        const t1 = roles.P1 !== null,
          t2 = roles.P2 !== null;
        document.getElementById("card-p1").classList.toggle("taken", t1);
        document.getElementById("card-p2").classList.toggle("taken", t2);
        document.getElementById("p1form").style.display = t1 ? "none" : "flex";
        document.getElementById("p2form").style.display = t2 ? "none" : "flex";
        document.getElementById("p1tk").style.display = t1 ? "" : "none";
        document.getElementById("p2tk").style.display = t2 ? "" : "none";
      });

      socket.on("namesUpdate", (n) => {
        names = n;
        updNames();
      });
      socket.on("roleError", (msg) => alert(msg));

      function join(role) {
        ea();
        let name = "";
        if (role === "P1") name = document.getElementById("n1").value.trim();
        if (role === "P2") name = document.getElementById("n2").value.trim();
        if ((role === "P1" || role === "P2") && !name) {
          toast("✏️ Please enter your name first!");
          document.getElementById(role === "P1" ? "n1" : "n2").focus();
          return;
        }
        myName = name || "Spectator";
        socket.emit("joinGame", { role, name });
      }

      socket.on("init", (data) => {
        myRole = data.role;
        players = data.players;
        splatters = data.splatters;
        names = data.names;
        updNames();
        document.getElementById("sel").style.display = "none";
        document.getElementById("gw").style.display = "flex";
        gameActive = true;

        const st = document.getElementById("status");
        if (myRole === "Spectator") {
          st.textContent = "👁️ Spectating";
          st.style.color = "#777";
        } else {
          st.textContent =
            (myRole === "P1" ? "💙" : "❤️") +
            " " +
            myName +
            " (" +
            myRole +
            ")";
          st.style.color = myRole === "P1" ? "#2266cc" : "#cc1130";
        }
        if (myRole !== "Spectator" && players[socket.id]) {
          me.x = players[socket.id].x;
          me.y = players[socket.id].y;
          me.dx = players[socket.id].dx;
          me.dy = players[socket.id].dy;
        }
        updScores(data.scores);
        sfx.powerup();
        toast(
          "🎨 Welcome, " +
            (myRole === "Spectator" ? "Spectator" : myName) +
            "!",
          2500
        );
        loop();
      });

      function resetGame() {
        if (confirm("Reset scores and clean the board?")) {
          socket.emit("resetGame");
          sfx.powerup();
        }
      }
      socket.on("gameReset", (data) => {
        players = data.players;
        splatters = data.splatters;
        balloons = [];
        particles = [];
        ammo = { balloon: Infinity, pichkari: Infinity, bomb: 3, burst: 2 };
        updAmmo();
        if (myRole !== "Spectator" && players[socket.id]) {
          me.x = players[socket.id].x;
          me.y = players[socket.id].y;
          me.dx = players[socket.id].dx;
          me.dy = players[socket.id].dy;
        }
        updScores(data.scores);
        toast("🔄 Game Reset!");
      });

      socket.on("stateUpdate", (d) => {
        players = d.players;
      });
      socket.on("scoreUpdate", (sc) => {
        updScores(sc);
        sfx.score();
      });
      socket.on("splatterAdded", (s) => {
        splatters.push(...s);
      });
      socket.on("balloonFired", (b) => {
        balloons.push(b);
      });
      socket.on("bombFired", (b) => {
        balloons.push(b);
      });
      socket.on("burstFired", (arr) => {
        balloons.push(...arr);
      });
      socket.on("pichkariFired", (arr) => {
        balloons.push(...arr);
      });
      socket.on("hitNotify", (data) => {
        if (data.victimId === socket.id) {
          flash(data.color);
          doShake(10);
          sfx.hit();
          toast("💥 You got splashed!", 1200);
        }
      });

      // ── Controls ───────────────────────────────────────
      const keys = { w: false, a: false, s: false, d: false };
      window.addEventListener("keydown", (e) => {
        ea();
        if (!gameActive) return;
        if (e.key === "w" || e.key === "ArrowUp") keys.w = true;
        if (e.key === "a" || e.key === "ArrowLeft") keys.a = true;
        if (e.key === "s" || e.key === "ArrowDown") keys.s = true;
        if (e.key === "d" || e.key === "ArrowRight") keys.d = true;
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          shoot();
        }
        if (e.key === "1") selW("balloon");
        if (e.key === "2") selW("pichkari");
        if (e.key === "3") selW("bomb");
        if (e.key === "4") selW("burst");
      });
      window.addEventListener("keyup", (e) => {
        if (e.key === "w" || e.key === "ArrowUp") keys.w = false;
        if (e.key === "a" || e.key === "ArrowLeft") keys.a = false;
        if (e.key === "s" || e.key === "ArrowDown") keys.s = false;
        if (e.key === "d" || e.key === "ArrowRight") keys.d = false;
      });
      const bt = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            ea();
            keys[key] = true;
          },
          { passive: false }
        );
        el.addEventListener(
          "touchend",
          (e) => {
            e.preventDefault();
            keys[key] = false;
          },
          { passive: false }
        );
      };
      bt("bu", "w");
      bt("bd", "s");
      bt("bl", "a");
      bt("br", "d");
      document.getElementById("splashbtn").addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          ea();
          shoot();
        },
        { passive: false }
      );
      document.getElementById("n1").addEventListener("keydown", (e) => {
        if (e.key === "Enter") join("P1");
      });
      document.getElementById("n2").addEventListener("keydown", (e) => {
        if (e.key === "Enter") join("P2");
      });

      // ── Shoot ──────────────────────────────────────────
      function shoot() {
        if (myRole === "Spectator" || cooldown > 0) return;
        const color = HOLI[~~(Math.random() * HOLI.length)];
        const cx = me.x,
          cy = me.y,
          dvx = me.dx * 12,
          dvy = me.dy * 12;

        if (weapon === "balloon") {
          socket.emit("shoot", {
            x: cx,
            y: cy,
            vx: dvx,
            vy: dvy,
            radius: 9,
            color,
            ownerRole: myRole,
            type: "balloon",
          });
          sfx.balloon();
          cooldown = 15;
        } else if (weapon === "pichkari") {
          const s = [];
          for (let i = 0; i < 6; i++)
            s.push({
              x: cx + me.dx * (i * 8),
              y: cy + me.dy * (i * 8),
              vx: dvx * 1.4 + (Math.random() - 0.5) * 2,
              vy: dvy * 1.4 + (Math.random() - 0.5) * 2,
              radius: 4,
              color,
              ownerRole: myRole,
              type: "pichkari",
              delay: i * 3,
            });
          socket.emit("pichkariShoot", s);
          sfx.pichkari();
          cooldown = 20;
        } else if (weapon === "bomb") {
          if (ammo.bomb <= 0) {
            sfx.empty();
            toast("💣 Out of bombs!");
            return;
          }
          ammo.bomb--;
          updAmmo();
          socket.emit("bombShoot", {
            x: cx,
            y: cy,
            vx: dvx * 0.7,
            vy: dvy * 0.7,
            radius: 14,
            color,
            ownerRole: myRole,
            type: "bomb",
          });
          sfx.bomb();
          cooldown = 25;
        } else if (weapon === "burst") {
          if (ammo.burst <= 0) {
            sfx.empty();
            toast("⚡ Out of burst!");
            return;
          }
          ammo.burst--;
          updAmmo();
          const b = [];
          for (let i = 0; i < 8; i++) {
            const a = (Math.PI * 2 * i) / 8;
            b.push({
              x: cx,
              y: cy,
              vx: Math.cos(a) * 10,
              vy: Math.sin(a) * 10,
              radius: 6,
              color,
              ownerRole: myRole,
              type: "burst",
            });
          }
          socket.emit("burstShoot", b);
          sfx.burst();
          cooldown = 30;
        }
      }

      // ── Power-ups ──────────────────────────────────────
      function spawnPU() {
        const types = ["bomb", "burst", "speed"],
          icons = { bomb: "💣", burst: "⚡", speed: "🚀" };
        const t = types[~~(Math.random() * types.length)];
        fieldPUs.push({
          x: 80 + Math.random() * (canvas.width - 160),
          y: 80 + Math.random() * (canvas.height - 160),
          type: t,
          icon: icons[t],
          r: 18,
          life: 500,
          pulse: Math.random() * Math.PI * 2,
        });
      }
      function checkPUs() {
        if (myRole === "Spectator") return;
        for (let i = fieldPUs.length - 1; i >= 0; i--) {
          const p = fieldPUs[i];
          if (Math.hypot(me.x - p.x, me.y - p.y) < p.r + 20) {
            if (p.type === "bomb") {
              ammo.bomb = Math.min(ammo.bomb + 2, 9);
              toast("💣 +2 Bombs!");
            }
            if (p.type === "burst") {
              ammo.burst = Math.min(ammo.burst + 1, 5);
              toast("⚡ +1 Burst!");
            }
            if (p.type === "speed") {
              speedBoost = 1.8;
              speedT = 200;
              toast("🚀 Speed Boost!");
            }
            updAmmo();
            parts(p.x, p.y, "#ffe033", 16, true);
            sfx.powerup();
            fieldPUs.splice(i, 1);
          }
        }
      }

      // ── Game Loop ──────────────────────────────────────
      function loop() {
        if (!gameActive) return;
        const spd = 5 * speedBoost;
        if (speedT > 0) speedT--;
        else if (speedBoost > 1) speedBoost = 1;

        if (myRole !== "Spectator" && myRole !== null) {
          let mv = false;
          if (keys.w) {
            me.y -= spd;
            me.dx = 0;
            me.dy = -1;
            mv = true;
          }
          if (keys.s) {
            me.y += spd;
            me.dx = 0;
            me.dy = 1;
            mv = true;
          }
          if (keys.a) {
            me.x -= spd;
            me.dx = -1;
            me.dy = 0;
            mv = true;
          }
          if (keys.d) {
            me.x += spd;
            me.dx = 1;
            me.dy = 0;
            mv = true;
          }
          if (mv) sfx.walk();
          me.x = Math.max(me.radius, Math.min(canvas.width - me.radius, me.x));
          me.y = Math.max(me.radius, Math.min(canvas.height - me.radius, me.y));
          if (mv) socket.emit("move", me);
          if (cooldown > 0) cooldown--;
          checkPUs();
        }

        if (--nextPU <= 0) {
          spawnPU();
          nextPU = 350 + Math.random() * 250;
        }
        for (let i = fieldPUs.length - 1; i >= 0; i--) {
          fieldPUs[i].life--;
          fieldPUs[i].pulse += 0.08;
          if (fieldPUs[i].life <= 0) fieldPUs.splice(i, 1);
        }

        for (let i = balloons.length - 1; i >= 0; i--) {
          const b = balloons[i];
          if (b.delay && b.delay > 0) {
            b.delay--;
            continue;
          }
          b.x += b.vx;
          b.y += b.vy;
          if (b.type === "pichkari") streamParts(b.x, b.y, b.vx, b.vy, b.color);
          if (myRole !== "Spectator" && b.ownerRole === myRole) {
            for (let id in players) {
              const p = players[id];
              if (p.role !== myRole) {
                const hr =
                  b.type === "bomb" ? 30 : b.type === "burst" ? 22 : 20;
                if (Math.hypot(b.x - p.x, b.y - p.y) < b.radius + hr) {
                  socket.emit("hit", {
                    hitRole: p.role,
                    victimId: id,
                    x: p.x,
                    y: p.y,
                    color: b.color,
                    type: b.type,
                  });
                  parts(
                    b.x,
                    b.y,
                    b.color,
                    b.type === "bomb" ? 25 : b.type === "burst" ? 16 : 12,
                    b.type === "bomb"
                  );
                  if (b.type === "bomb") doShake(14);
                  balloons.splice(i, 1);
                  break;
                }
              }
            }
            if (!balloons[i]) continue;
          }
          if (
            b.x < -20 ||
            b.x > canvas.width + 20 ||
            b.y < -20 ||
            b.y > canvas.height + 20
          )
            balloons.splice(i, 1);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.g;
          p.vx *= 0.96;
          p.vy *= 0.96;
          p.a -= p.decay;
          p.life -= p.decay;
          if (p.life <= 0) particles.splice(i, 1);
        }

        if (shake.t > 0) {
          shake.t--;
          shake.x = (Math.random() - 0.5) * shake.i;
          shake.y = (Math.random() - 0.5) * shake.i;
        } else {
          shake.x = 0;
          shake.y = 0;
        }

        draw();
        requestAnimationFrame(loop);
      }

      // ── Draw ───────────────────────────────────────────
      function draw() {
        ctx.save();
        ctx.translate(shake.x, shake.y);
        ctx.clearRect(-10, -10, canvas.width + 20, canvas.height + 20);
        ctx.fillStyle = "#fafafa";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(0,0,0,.03)";
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += 40) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += 40) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }

        // Splatters
        splatters.forEach((s) => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fillStyle = s.color;
          ctx.globalAlpha = 0.55;
          ctx.fill();
          ctx.globalAlpha = 0.18;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius * 1.5, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Power-ups
        fieldPUs.forEach((pu) => {
          const pl = Math.sin(pu.pulse) * 0.15 + 1;
          ctx.save();
          ctx.translate(pu.x, pu.y);
          ctx.scale(pl, pl);
          const g = ctx.createRadialGradient(0, 0, 0, 0, 0, pu.r * 2.2);
          g.addColorStop(0, "rgba(255,220,50,.45)");
          g.addColorStop(1, "rgba(255,220,50,0)");
          ctx.beginPath();
          ctx.arc(0, 0, pu.r * 2.2, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(0, 0, pu.r, 0, Math.PI * 2);
          ctx.fillStyle = "#fff";
          ctx.strokeStyle = "#ffe033";
          ctx.lineWidth = 2.5;
          ctx.fill();
          ctx.stroke();
          ctx.font = "15px serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(pu.icon, 0, 1);
          ctx.restore();
        });

        // Particles
        particles.forEach((p) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.a;
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Players
        for (let id in players) {
          const p = players[id];
          const isMe = id === socket.id;
          const dx = isMe ? me.x : p.x,
            dy = isMe ? me.y : p.y;
          const ddx = isMe ? me.dx : p.dx,
            ddy = isMe ? me.dy : p.dy;

          // Shadow
          ctx.beginPath();
          ctx.ellipse(dx, dy + 21, 14, 5, 0, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(0,0,0,.1)";
          ctx.fill();

          // Speed aura
          if (isMe && speedBoost > 1) {
            const au = ctx.createRadialGradient(dx, dy, 0, dx, dy, 36);
            au.addColorStop(0, "rgba(255,220,0,.3)");
            au.addColorStop(1, "rgba(255,220,0,0)");
            ctx.beginPath();
            ctx.arc(dx, dy, 36, 0, Math.PI * 2);
            ctx.fillStyle = au;
            ctx.fill();
          }

          // Body
          ctx.beginPath();
          ctx.arc(dx, dy, 20, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          ctx.lineWidth = isMe ? 3 : 2;
          ctx.strokeStyle = isMe ? "#fff" : "#bbb";
          ctx.stroke();

          // Eye
          const ex = dx + ddx * 10,
            ey = dy + ddy * 10;
          ctx.beginPath();
          ctx.arc(ex, ey, 6, 0, Math.PI * 2);
          ctx.fillStyle = "#fff";
          ctx.fill();
          ctx.beginPath();
          ctx.arc(ex + ddx * 2, ey + ddy * 2, 3, 0, Math.PI * 2);
          ctx.fillStyle = "#222";
          ctx.fill();

          // Smile
          ctx.beginPath();
          ctx.arc(dx, dy + 5, 10, 0.15, Math.PI - 0.15);
          ctx.strokeStyle = "rgba(255,255,255,.85)";
          ctx.lineWidth = 2;
          ctx.stroke();

          // Name tag
          const tag = (p.name || p.role) + (isMe ? " (You)" : "");
          ctx.font = "bold 12px Nunito,sans-serif";
          const tw = ctx.measureText(tag).width;
          ctx.fillStyle = "rgba(255,255,255,.9)";
          if (ctx.roundRect) {
            ctx.beginPath();
            ctx.roundRect(dx - tw / 2 - 6, dy - 44, tw + 12, 18, 5);
            ctx.fill();
          } else {
            ctx.fillRect(dx - tw / 2 - 6, dy - 44, tw + 12, 18);
          }
          ctx.fillStyle = p.color;
          ctx.textAlign = "center";
          ctx.fillText(tag, dx, dy - 30);
        }

        // Projectiles
        balloons.forEach((b) => {
          if (b.delay && b.delay > 0) return;
          if (b.type === "bomb") {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#1a1a2e";
            ctx.fill();
            ctx.strokeStyle = b.color;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(b.x, b.y - b.radius);
            ctx.lineTo(b.x + 5, b.y - b.radius - 8);
            ctx.strokeStyle = "#ff8c00";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.font = "10px serif";
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";
            ctx.fillText("💥", b.x, b.y + 4);
          } else if (b.type === "burst") {
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate(Date.now() * 0.01);
            ctx.beginPath();
            for (let s = 0; s < 6; s++) {
              const a = (s * Math.PI * 2) / 6;
              s === 0
                ? ctx.moveTo(Math.cos(a) * b.radius, Math.sin(a) * b.radius)
                : ctx.lineTo(Math.cos(a) * b.radius, Math.sin(a) * b.radius);
            }
            ctx.closePath();
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
          } else if (b.type === "pichkari") {
            ctx.beginPath();
            ctx.ellipse(
              b.x,
              b.y,
              b.radius * 0.6,
              b.radius * 1.8,
              Math.atan2(b.vy, b.vx) + Math.PI / 2,
              0,
              Math.PI * 2
            );
            ctx.fillStyle = b.color;
            ctx.globalAlpha = 0.8;
            ctx.fill();
            ctx.globalAlpha = 1;
          } else {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,.25)";
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(
              b.x - b.radius * 0.3,
              b.y - b.radius * 0.3,
              b.radius * 0.25,
              0,
              Math.PI * 2
            );
            ctx.fillStyle = "rgba(255,255,255,.5)";
            ctx.fill();
          }
        });

        // HUD hint
        if (myRole && myRole !== "Spectator") {
          const ic = { balloon: "🎈", pichkari: "💦", bomb: "💣", burst: "⚡" };
          ctx.font = "11px Nunito,sans-serif";
          ctx.fillStyle = "rgba(0,0,0,.35)";
          ctx.textAlign = "left";
          ctx.fillText(
            ic[weapon] +
              " " +
              weapon +
              " active  ·  [1] Balloon  [2] Pichkari  [3] Bomb  [4] Burst",
            8,
            canvas.height - 8
          );
        }
        ctx.restore();
      }
    </script>
  </body>
</html>
